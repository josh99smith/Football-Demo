<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>7-on-7 Football</title>
  <link rel="stylesheet" href="src/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.js",
      "three/addons/": "./vendor/three/addons/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Loading…</div>
  </div>

  <canvas id="scene"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="scoreboard">
      <span class="team off">OFF <b id="score-off">0</b></span>
      <span class="sep">·</span>
      <span class="team def">DEF <b id="score-def">0</b></span>
      <span class="downinfo" id="downinfo">1st &amp; 10</span>
    </div>
    <div id="status">Tap SNAP to start the play</div>
  </div>

  <!-- Big center-screen hit/score callout -->
  <div id="banner"></div>

  <!-- 1-on-1 break-tackle battle (mash to break free) -->
  <div id="battle" class="hidden">
    <div id="battle-prompt">BREAK THE TACKLE!</div>
    <div id="battle-bar">
      <div id="battle-fill"></div>
      <div id="battle-div"></div>
    </div>
    <div id="battle-tap">TAP! &nbsp; TAP! &nbsp; TAP!</div>
  </div>

  <!-- Mobile touch joystick (left) -->
  <div id="joystick" class="joystick">
    <div id="joystick-knob" class="joystick-knob"></div>
  </div>

  <!-- Right-side buttons -->
  <div id="action-btn" class="action-btn">SNAP</div>
  <div id="turbo-btn" class="mini-btn turbo"><div id="turbo-fill"></div><span>TURBO</span></div>
  <div id="switch-btn" class="mini-btn">RECEIVER ▸</div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
