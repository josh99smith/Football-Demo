<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>7-on-7 Football</title>
  <link rel="stylesheet" href="src/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.js",
      "three/addons/": "./vendor/three/addons/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Loading…</div>
  </div>

  <canvas id="scene"></canvas>

  <div id="build-badge"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="scoreboard">
      <span class="team off">OFF <b id="score-off">0</b></span>
      <span class="gameclock"><b id="game-clock">1:30</b><i id="quarter">1ST</i></span>
      <span class="team def">DEF <b id="score-def">0</b></span>
    </div>
    <div id="chains">
      <span class="downinfo" id="downinfo">1st &amp; 30</span>
      <span class="playclock" id="playclock">:15</span>
    </div>
    <div id="status">Tap SNAP to start the play</div>
  </div>

  <!-- Big center-screen hit/score callout -->
  <div id="banner"></div>

  <!-- 1-on-1 break-tackle battle (mash to break free) -->
  <div id="battle" class="hidden">
    <div id="battle-prompt">BREAK THE TACKLE!</div>
    <div id="battle-bar">
      <div id="battle-fill"></div>
      <div id="battle-div"></div>
    </div>
    <div id="battle-tap">TAP! &nbsp; TAP! &nbsp; TAP!</div>
  </div>

  <!-- Pre-snap play-select screen (pick one of four) -->
  <div id="playselect" class="hidden">
    <div class="ps-title">CHOOSE YOUR PLAY</div>
    <div class="ps-grid">
      <button class="ps-card" data-play="0"><i>1</i><b>BOMBS</b><span>Four verticals</span></button>
      <button class="ps-card" data-play="1"><i>2</i><b>SLANTS</b><span>Quick slants</span></button>
      <button class="ps-card" data-play="2"><i>3</i><b>MESH</b><span>Crossers</span></button>
      <button class="ps-card" data-play="3"><i>4</i><b>FLOOD</b><span>Sideline outs</span></button>
    </div>
  </div>

  <!-- Mobile touch joystick (left) -->
  <div id="joystick" class="joystick">
    <div id="joystick-knob" class="joystick-knob"></div>
  </div>

  <!-- Right-side buttons -->
  <div id="action-btn" class="action-btn">SNAP</div>
  <div id="turbo-btn" class="mini-btn turbo"><div id="turbo-fill"></div><span>TURBO</span></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
