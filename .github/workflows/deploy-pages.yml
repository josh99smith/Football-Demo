name: Deploy to GitHub Pages

on:
  # Deploy whenever the site changes on the main branch or the demo branch.
  push:
    branches:
      - main
      - claude/football-game-demo-6gi1s5
  # Allow running the deployment manually from the Actions tab.
  workflow_dispatch:

# Permissions required by the GitHub Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The site lives at the repository root (index.html).
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
