name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/football-game-demo-6gi1s5]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build version + date
        run: |
          printf "// Regenerated by the deploy workflow on each Pages deploy (see deploy-pages.yml).\nexport const BUILD = { version: '%s', date: '%s' };\n" \
            "$(git rev-parse --short HEAD)" "$(date -u +'%Y-%m-%d %H:%M UTC')" > src/build.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
